# Deploy the repository to GitHub Pages: the landing page at /, the run viewer
# at /experience/, and the fictional demo tapes under /intelligence/out/.
# This public repository is already curated — only fictional, labelled demo
# tapes (ferrite-*) are present, so the whole tree is safe to publish as-is.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
